<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <defs>
    <style>
      .logo-frame { fill: none; stroke: #c87941; stroke-width: 1.5; }
      .etch-line { stroke: #c87941; stroke-width: 1; }
      .etch-line-fine { stroke: #c87941; stroke-width: 0.75; }
      .e-mark { fill: none; stroke: #e09a5f; stroke-width: 2.5; stroke-linecap: square; }
      .wordmark { font-family: 'DM Mono', 'Courier New', monospace; font-size: 28px; font-weight: 500; letter-spacing: 4px; fill: #e09a5f; }
      .tagline { font-family: 'DM Mono', 'Courier New', monospace; font-size: 10px; letter-spacing: 2px; fill: #8891a5; text-transform: uppercase; }
    </style>
  </defs>
  
  <!-- LOGO MARK: Etching plate with crosshatch and E -->
  <g transform="translate(10, 10)">
    <!-- Plate border -->
    <rect class="logo-frame" x="2" y="2" width="56" height="56"/>
    
    <!-- Crosshatch etching lines -->
    <line class="etch-line" x1="12" y1="12" x2="48" y2="48" opacity="0.5"/>
    <line class="etch-line-fine" x1="12" y1="20" x2="40" y2="48" opacity="0.3"/>
    <line class="etch-line-fine" x1="20" y1="12" x2="48" y2="40" opacity="0.3"/>
    <line class="etch-line-fine" x1="12" y1="28" x2="32" y2="48" opacity="0.15"/>
    <line class="etch-line-fine" x1="28" y1="12" x2="48" y2="32" opacity="0.15"/>
    
    <!-- E letterform carved into plate -->
    <path class="e-mark" d="M18 16 L18 44 M18 16 L40 16 M18 30 L36 30 M18 44 L40 44"/>
  </g>
  
  <!-- WORDMARK -->
  <text class="wordmark" x="88" y="48">ETCHA</text>
  
  <!-- TAGLINE -->
  <text class="tagline" x="88" y="64">Options etched on-chain</text>
</svg>
